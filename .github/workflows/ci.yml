name: Build and policy checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, build and validate container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: corepack enable

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run policy and unit checks
        run: pnpm test

      - name: Build production assets
        run: pnpm run build

      - name: Build production container
        run: docker build --tag content-protect-ci:${{ github.sha }} .
