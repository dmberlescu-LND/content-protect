name: Production monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Fail after the checks to test alert delivery"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: false

jobs:
  production-health:
    name: Public health and security checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      APP_URL: https://content-protect.com
      REQUIRE_PRODUCTION_READY: "false"
      MONITORING_HEARTBEAT_TOKEN: ${{ secrets.MONITORING_HEARTBEAT_TOKEN }}
    steps:
      - name: Check out the monitored release
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify twice before alerting
        shell: bash
        run: |
          for attempt in 1 2; do
            if node scripts/verify-production.mjs && node scripts/verify-seo.mjs; then
              exit_code=0
              break
            fi
            exit_code=1
            if [ "$attempt" -lt 2 ]; then
              echo "First check failed; retrying in 60 seconds."
              sleep 60
            fi
          done
          exit "$exit_code"

      - name: Simulate a monitor failure
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_failure }}
        run: |
          echo "Intentional failure used to verify the external alert route."
          exit 1

      - name: Record verified monitoring evidence
        if: ${{ env.MONITORING_HEARTBEAT_TOKEN != '' }}
        shell: bash
        run: |
          monitored_release="$(curl --fail --silent --show-error "$APP_URL/api/health" | node -e 'let s=""; process.stdin.on("data",c=>s+=c).on("end",()=>process.stdout.write(JSON.parse(s).release))')"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $MONITORING_HEARTBEAT_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"release\":\"$monitored_release\",\"production\":true,\"seo\":true}" \
            "$APP_URL/api/operations/monitor-heartbeat"
