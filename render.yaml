services:
  - type: web
    name: content-protect-staging
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENTS_MODE
        value: test
      - key: TAKEDOWNS_MODE
        value: sandbox
      - key: YOTI_MODE
        value: sandbox
      - key: BIOMETRICS_ENABLED
        value: "false"
      - key: CONTENT_PROTECT_MASTER_KEY
        generateValue: true
      - key: APP_URL
        value: https://content-protect.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONITOR
        sync: false
      - key: STRIPE_PRICE_PROTECT
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_TAX_ENABLED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: RESET_FROM_EMAIL
        value: Content Protect <security@content-protect.com>
      - key: TAKEDOWN_FROM_EMAIL
        value: Content Protect Legal <legal@content-protect.com>
      - key: TAKEDOWN_OPERATOR_TOKEN
        sync: false
      - key: TAKEDOWN_LEGAL_APPROVED_VERSION
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: YOTI_SDK_ID
        sync: false
      - key: YOTI_PRIVATE_KEY
        sync: false
      - key: TINEYE_API_KEY
        sync: false
      - key: TINEYE_API_URL
        value: https://api.tineye.com/rest/search/
      - key: RETENTION_EXECUTION_ENABLED
        value: "false"
      - key: MONITORING_HEARTBEAT_TOKEN
        sync: false
      - key: BACKUP_EVIDENCE_KEY
        generateValue: true
      - key: BACKUP_RESTORE_EVIDENCE_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
    disk:
      name: content-protect-staging-data
      mountPath: /app/.traceguard-data
      sizeGB: 1

  - type: cron
    name: content-protect-retention
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerCommand: node scripts/retention.mjs
    schedule: "17 3 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: RETENTION_EXECUTION_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: DATABASE_URL
      - key: OBJECT_STORAGE_ENDPOINT
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_ENDPOINT
      - key: OBJECT_STORAGE_BUCKET
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_BUCKET
      - key: OBJECT_STORAGE_REGION
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_REGION
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_ACCESS_KEY_ID
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_SECRET_ACCESS_KEY

  - type: cron
    name: content-protect-backup
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerCommand: node scripts/run-backups.mjs
    schedule: "47 2 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://content-protect.com
      - key: DATABASE_URL
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: DATABASE_URL
      - key: OBJECT_STORAGE_ENDPOINT
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_ENDPOINT
      - key: OBJECT_STORAGE_BUCKET
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_BUCKET
      - key: OBJECT_STORAGE_REGION
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_REGION
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_ACCESS_KEY_ID
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: OBJECT_STORAGE_SECRET_ACCESS_KEY
      - key: BACKUP_EVIDENCE_KEY
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: BACKUP_EVIDENCE_KEY
      - key: BACKUP_RESTORE_EVIDENCE_URL
        value: https://content-protect.com/api/operations/backup-restore-evidence
      - key: BACKUP_RESTORE_EVIDENCE_TOKEN
        fromService:
          type: web
          name: content-protect-staging
          envVarKey: BACKUP_RESTORE_EVIDENCE_TOKEN
      - key: BACKUP_ARCHIVE_ENCRYPTION_KEY
        generateValue: true
      - key: BACKUP_OBJECT_STORAGE_ENDPOINT
        value: https://dfb93f9f2f6bf8a6434514b26b686e57.r2.cloudflarestorage.com
      - key: BACKUP_OBJECT_STORAGE_BUCKET
        value: content-protect-private-backups
      - key: BACKUP_OBJECT_STORAGE_REGION
        value: auto
      - key: BACKUP_OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: BACKUP_OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
