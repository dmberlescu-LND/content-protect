services:
  - type: web
    name: content-protect-staging
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    preDeployCommand: pnpm run db:migrate
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENTS_MODE
        value: test
      - key: TAKEDOWNS_MODE
        value: sandbox
      - key: BIOMETRICS_ENABLED
        value: "false"
      - key: CONTENT_PROTECT_MASTER_KEY
        generateValue: true
      - key: APP_URL
        value: https://content-protect.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONITOR
        sync: false
      - key: STRIPE_PRICE_PROTECT
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_TAX_ENABLED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: RESET_FROM_EMAIL
        value: Content Protect <security@content-protect.com>
      - key: TAKEDOWN_FROM_EMAIL
        value: Content Protect Legal <legal@content-protect.com>
      - key: TAKEDOWN_OPERATOR_TOKEN
        sync: false
      - key: TAKEDOWN_LEGAL_APPROVED_VERSION
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: YOTI_API_KEY
        sync: false
      - key: YOTI_SDK_ID
        sync: false
      - key: TINEYE_API_KEY
        sync: false
      - key: TINEYE_API_URL
        value: https://api.tineye.com/rest/search/
      - key: RETENTION_EXECUTION_ENABLED
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
    disk:
      name: content-protect-staging-data
      mountPath: /app/.traceguard-data
      sizeGB: 1
