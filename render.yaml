services:
  - type: web
    name: content-protect-staging
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENTS_MODE
        value: sandbox
      - key: TAKEDOWNS_MODE
        value: sandbox
      - key: BIOMETRICS_ENABLED
        value: "false"
      - key: CONTENT_PROTECT_MASTER_KEY
        generateValue: true
      - key: APP_URL
        value: https://content-protect.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESET_FROM_EMAIL
        value: Content Protect <security@content-protect.com>
      - key: DATABASE_URL
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
    disk:
      name: content-protect-staging-data
      mountPath: /app/.traceguard-data
      sizeGB: 1
